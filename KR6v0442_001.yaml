body:
  text: 宋復庵作華嚴綸貫貫徹一經大旨往往歸於禪悟今以本經要文通淨土之關復彼直示圓極之理此略明事理雙行雖似效顰其門不同名為華嚴通關也余今年七十六一死亦在近矣因以日用所誦持華嚴略抄二本付與二三子且述斯書預擬遺訓其文曰諸仁者盡此一生受持淨戒如捧油鉢信重佛法如護命根不隨魔緣如須彌山截斷妄想如大利劒仰佛加護稱佛名號誓轉穢身必生佛土又應念我昔不聞佛名今即念彌陀洪名我昔不聞大法今即誦華藏法音此便人中上上人人中希有人又此華嚴經者十身毘盧遮那安住華藏法界海會以一切諸佛同一體性十華藏世界海微塵數大人相所演說之根本法輪八萬四千諸波羅蜜淨佛國土成就眾生無始無終常恆不變乃至眾生說國土說三世如是說取要言之逈然超出文字言詮情識之表人人具足現今圓成一念法界之全體是也又此經中處處明念佛三昧其文非一善財最初善知識德雲比丘教之以念佛三昧乃至結會行願品以普賢勝行廻向安樂剎應知一切經中淨土法門皆自斯經出又此華嚴經大要諦信文殊無相妙慧了達心性本無所有發起普賢如幻行願淨佛國土成就眾生兼此二而不有所住是為三聖一體之佛斯則徹心空而不滯空想起幻智而不著有為體中諦而不住諦理無思之思縛解俱亡自然能入不可思議無障礙法界本經云菩薩觀心不在外亦復不得在於內知其心性無所有我法皆離永寂滅見是不可思議相是則能知無相法若能住是甚深法常樂修行菩薩行菩薩住是不思議於中思議不可盡入此不可思議處思與非思皆寂滅文又應知以取相分別之識種感六趣生死之業影由正智離念之勝因證四德常住之妙果是以一切諸佛說法利生以無分別無礙行即能入法界海會也今吾審觀日用之心苦樂愛憎生滅萬變如鳥跡如電光無相無形無有實體亦求其心本無來處無去處不在內不在外本來無念此無念心性廓然周徧虛空法界心佛眾生常住一相如如不動復此心性雖無所住隨緣應物變現無窮譬如有大圓鏡量等虛空山河人畜盡現影像然此影像雖變現無窮非生非滅現與不現鏡體本明體用無二心佛眾生亦復如是緣起無盡性相一如曹溪云但淨本心使六識出六門於六塵中通用無滯名無念行若百物不思當令念絕即是法縛即名邊見悟無念法者萬法盡通悟無念法者見諸佛境悟無念法者至佛地位文伏惟諸佛究盡斯理以一法界為身為土安住盡十方虛空界廣大佛剎具足大智光明常樂我淨功德大悲願力普現身雲隨眾生心感應道交眾生迷背斯理認自識影為身為土如蠶作繭人我繫縛分別痛苦生老病死六趣淪轉無有窮已然此迷悟但隨眾生分別妄見假立名言若能隨順不二心性歸入於法界海會則唯一佛土無比無對性相無礙生佛一如百川入海本名安在一瞖在眼空華亂墜本經云如來境界無邊際一念法界悉充滿一一塵中建道場悉證菩提起神變菩薩能修普賢行遊行法界微塵道塵中悉現無量剎清淨廣大如虛空等虛空界現神通悉詣道場諸佛前蓮華座上示眾相一一身包一切剎願一切佛剎皆悉清淨以不可說不可說莊嚴具而莊嚴之一一佛剎其量廣大同於法界純善無礙清淨光明諸佛於中現成正覺一佛剎中清淨境界悉能顯現一切佛剎如一佛剎一切佛剎亦復如是其一一剎悉以等法界無量無邊清淨妙寶莊嚴之具而為嚴飾又為令一切眾生皆得無限量大菩提周徧法界無所障礙故廻向為令一切眾生皆得平等無分別同體善根故廻向為令一切眾生皆得入一切同體清淨佛剎故廻向善導云西方寂靜無為樂畢竟逍遙離有無大悲熏心遊法界分身利物等無殊一到彌陀安養國畢竟逍遙即涅槃涅槃莊嚴處處滿見色聞香罪障除百寶莊嚴隨念現長劫供養報慈恩微塵故業隨智滅不覺轉入真如門普願有緣同行者專心直入不須疑一到彌陀安養國元來是我法王家一日七日專稱佛命斷須臾生安樂一入彌陀涅槃國即得不退證無生門門不同八萬四為滅無明果業因利劒即是彌陀號一聲稱念罪皆除同學相隨遊法界法界即是如來國一一佛國恆沙會分身聽法修供養得蒙諸佛慈光照摩頂授記入無餘意樂他方住即住須欲歸還即歸還本國他方亦無二悉是涅槃平等法諸佛智慧亦同然到處盡是法王家善導自釋法界有三義一者心徧故二者身徧故三者無障礙故此無障礙法界與華嚴事事無礙法界同華嚴宗有四法界謂事法界理法界理事無礙法界事事無礙法界此四法界亦一一互具淨宗有二門謂教門實義門約教門則以法界為眾生以身屬佛今依實義門此二門尅而言之亦互相具善導既言法界即是如來國豈但滯一門哉李長者云無盡佛國不出一塵不立限量故以法為界相海純雜色像重重此實淨土非權取又云十方不遠此方無近乃至時日歲劫性自無遷一念迷亡古今多劫即纖毫不轉如斯等意皆悉不可思議法界佛國土也又問曰彼佛及土既言報者報法高妙小聖難階垢障凡夫云何得入答曰若論眾生垢障實難欣趣正由託佛願以作強緣致使五乘齊入又眾生業障觸目生盲指掌謂遠他方隔竹笻笻者笠也即踰之千里豈況凡夫分外諸佛境內闚心自非聖力冥加彼國何由得觀文夫諸佛同體本報海會無障無礙充滿法界如千燈互照光光增明應物現形如一月在天影現眾水但以眾生亂想無由寄託標心西方簡餘九域今以彌陀為法門主則十方三世一切佛剎盡為彌陀身土乃至心佛眾生一切趣一一趣一切事事無礙法界主伴具足然則吾曹雖已安住彌陀海會一水四見智隔報殊猶如生盲不見天日宜當脫去竛塀之窮途通達華藏之鄉關也天親淨土論云入第三門者以一心專念作願生彼修奢摩他寂靜三昧行故得入蓮華藏世界又善導疏玄義分多引證舊華嚴經就中以功德雲念佛一行三昧證所立專修念佛三昧又往生禮讚以文殊般若經同證一行三昧應知善導本意除所依淨土三經則以此二經亦為宗要的證今以華嚴通淨土之關故有由如上義焉又按善導觀無量壽經疏釋第八像觀中斥唯識法身自性清淨佛性等觀云經文既言想像假立三十二相乃至此觀門等唯指方立相住心而取境總不明無相離念也吾宗家言所破乃指淨影嘉祥兼及台教此唯約教門若約實義諸師亦通且如台教其義最親天台四明皆共事禪明此觀門所謂帶事行行無觀有觀無念有念事理雙修定慧不二非單法身單無生觀也四明釋此觀云作是不二遮照同時此則即觀無觀用無作行修念佛定乃至此術不施勝相不發善導既釋前地觀云凝心不絕即是見淨土之相此名想中見又想心漸微覺念頓除正受相應證於三昧台疏云前水是想不能滅罪地觀是實故能除斷此實觀者即一心三觀絕能所心緣正受者即覺念頓除離分別想念此皆無分別智現量所得心鏡無垢勝相自現若又有分別覺念則心鏡有垢故勝相不現縱令有現假而非真亦或如言心水澄淨魚石顯現濁則不現也是故實觀正受雖名異義通善導本約下機天台專被上機教門有別歸元無二凡圓極一乘華嚴法華及餘大乘經典靡不盡明事理無礙體用不二如夫禪門教外別傳竪一指行一棒事理不自在乃名法縛荊溪釋四教念佛云前之三教各念一佛謂生應報圓念法身諸身具足清涼釋德雲念佛三昧云以如為佛則無境非佛故云普觀又若報若化一時觀故已上文中事理自圓矣天台十疑論斥無生見解示生即無生通淨土之門蓋立教破立各有所據但無奈何末學之執弊耳又如第九真身觀經文有六十萬億那由他恆河沙由旬身量百萬億那由他恆河沙化佛復有八萬四千相八萬四千隨形好八萬四千光明其一一中陪陪增數無量無邊周徧法界此身量化佛相好光明非取相分別觀想思惟之所能及與華嚴十蓮華藏微塵數相海全同矣善導至釋此觀以念佛眾生文約稱名念佛明有親緣近緣增上緣次引證無量壽經阿彌陀經而不委及無邊相海斯乃急流水中悲心徹底專在凡下不俟結勸流通之文六字匕首突然露出匕首者短刀也又前像觀者假正報也眾生障重真容難階假立形像且注心想至真身觀不可以形相思惟念唯此不觀相貌專稱名字隨順佛願相應佛心不假作意以無觀之觀拆如空相海大權密意不得而可測也又至流通文汝好持是語持是語者即是持無量壽佛名云正明付囑彌陀名號流通於遐代上來雖說定散兩門之益望佛本願意在眾生一向專稱彌陀佛名斯文淨宗的的要旨不論觀心觀想知解方便一句利劒聲聲下業種之識田念念斫我法之稠林語其高則一棒一喝尚涉根塵語其卑則信男信女不妨職業願生淨土之門八字打開佛祖同轍之心雪中藏鷺於戲偉哉大導師定散諸門結歸稱佛稱佛之行還貫定散何以故口稱三昧心眼即開不勞觀想見彼勝境故復無觀稱佛相應法身圓頓諸門無二無別故所期淨土界徹因源生一土即融法界佛剎所修佛號因該果海念一佛即見十方諸佛於是應當增信不可思議功德諸佛所護念也吾邦空祖洞達善導專修之門專立稱名念佛三昧其宗教要旨詳選擇集又有一紙法語其意云但為往生極樂稱彌陀名號更不假觀想觀心思量方便乃至縱令學習一代教門還同愚癡一向念佛又法語云淺者深也以無義即為義以無樣樣者法也即為樣斯等語雖簡而穩矣一日吸盡西江水直示圓極源底悟了同未悟之佛行也又二祖鎮西聖光國師識知淨土論云若約往生淨土機者縱雖下根下智人萬行之中但取一行畢命為期而勤行之臨終之時必得往生此是易行中易行今明菩薩淨佛國土言易度故是即易行義也問云近代善導一門之流以念佛往生名易行道為往生業以諸行往生名難行道不許往生此義云何答此日諸方淨土學者皆存此旨其義不然所以者何善導和尚乃至但是被稱名一機且立專修之義永以非簡諸行往生故觀經云三世諸佛淨業正因如此說者念佛諸行不可是非三福九品之行因皆悉往生之正因又云佛名即實相之名實相即是一切法門是故讚歎佛名之時一切法門皆是讚歎之此即名體不二性相一如故也是故智論云以佛名號為實相法又國師徹選擇中舉八種選擇更加二十二種選擇宗教廢立益嚴而又汎融淨土之門文云至極甚深之大乘者名即體也相即性也是故名體不二性相一如然則此念佛三昧一切諸佛之體性也此是大乘至極之法門也又夫欲知念佛往生先須知一切菩薩淨佛國土成就眾生之義也乃至單聖道門人單淨土門人不可知之聖道淨土兼學之人可知之此則聖教之源底也法門之奧義也佛菩薩之祕術也此書之上不可載盡委可聞口傳也又稱名念佛不論機根之淺深自然正智正解相應佛心契同淨佛國土成就眾生之行已上國師靈文載海藏典決今重舉之此義於吾淨宗為大要的請同法之人數熟讀則亦有其不差也夫國師者空祖大師正宗得髓嫡傳親蒙證明其言曰源空全身即是聖光吾與聖光一體無二如選擇集則當吾邦宗教多途之時大倡究竟一乘果號不拂不瑩疾乘佛願暗契佛心單提直入不敢涉理解三根易行五乘齊修是故持名弘通如百川之就下洋洋流溢四海也至二祖國師法運應時廣融性相益彰真風於是淨教周備赫然猶如杲日升天宗教施設一張一弛豈易測哉爾來龍象迭興稟承鎮西大振斯道了譽冏公云幸哉我等依大師自解佛願恩力不觀佛身正見佛心乃至觀佛行人佛影現行者心中念佛眾生辱居在佛心內當知影現有時居在無間又一處忘縱橫亍彳間失行止斯等意與禪門所謂未悟時銀山鐵壁悟了還銀山鐵壁相同如上祖訓為鎮西正宗傳燈佛子者不可不知也古語云竹密不妨流水過山高豈礙白雲飛然法末流弊諸門互執廢立動至有一佛乘中深著二見自讚毀他行業未立地獄先辨者也龍樹云自法愛染故毀訾他人法雖持戒人不脫地獄苦又諸佛聖人為凡夫說法而凡夫著音聲語言不取聖人意不得實義不得實義故還於實中生著文良以諸佛出世大法十方佛土唯一佛乘皆悉以不可思議無分別無礙行乃能得入清淨法界無邊佛剎何以故如向所言從妄想分別既現此苦報今以無分別無礙行還到本國理當然故復無分別無礙行即是念無邊法界無邊法界即是如來故涅槃經云又無住者名無邊法界無邊法界即是如來云何言住是以華嚴一念法界天台一心三觀密教通達本心禪門見性成佛淨宗一心不亂等其名雖殊其揆一也法華經云如三世諸佛說法之儀式我今亦如是說無分別法心地觀經云一切如來觸無所得乃成佛道化諸諸眾生大日經云虛空相是菩提無知解者亦無開曉圓覺經云何況能以有思惟心測度如來圓覺境界如取螢火燒須彌山終不能著金剛經云莊嚴佛土者即非莊嚴是名莊嚴乃至應無所住而生其心金光明經云法身是正覺法界即如來乃至又善男子一切如來有三種身一者化身二者應身三者法身乃至唯有如如如如智是名法身前二種身是假名有此第三身是真實有為前二身而作根本何以故離法如如離無分別智一切諸佛無有別法又依於此身得發初心修行地心乃至金剛之心如來之心而悉顯現無量無邊如來妙法皆悉依此法身不可思議摩訶三昧而得顯現佛藏經云諸佛無量不可思議不可稱量乃至諸佛無分別以是故念無分別即是念佛文殊般若經云欲入一行三昧應處空閑捨諸亂意不取相貌繫心一佛專稱名字隨佛方所端身正向能於一佛念念相續即是念中能見過去未來現在諸佛何以故念一佛功德無量無邊亦與無量諸佛功德無二不思議佛法等無分別皆乘一如成最正覺阿彌陀經云執持名號若一日乃至七日一心不亂其人臨命終時阿彌陀佛與諸聖眾現在其前是人終時心不顛倒即得往生阿彌陀佛極樂國土此小本中有九句不可思議五句甚難難信夫言不可思議功德難信之法者非分別思惟之所能及故四句百非無在然則經中所說信願持名依正莊嚴皆悉不可思議與華嚴所說法門無二無別智旭所謂華嚴所稟却在此經信知言哉又應知一心不亂有事理二門吾善導空祖所立稱名念佛專被下機兼接上根是故不問事持理持一心專念彌陀名號乃至念念不捨者是名正定之業且佛法初門指方立相未始明離念之法但有久近念念不捨實修行人應當明信佛之真體不可思議不稱量是法不可在文字情解中而已矣今所勸進念佛三昧亦復如是雖有相好功德種種之門不觀相貌專稱名字一言以蔽諸若能如上以無分別無所得心稱佛名號念念相續一心不亂即是圓照彌陀諸佛同一法身三身十身無障無礙嚴土利生周徧十方臨命終時不隔當念親感佛迎往詣佛國智慧神通無量妙法從一佛號莫不顯現矣疑者云若言以無分別無所得心念佛將無有願生淨土之心耶曰不然此非令念絕而為無分別無所得唯言不假知解方便一心稱佛名精詣不撓乃妄想分別自然消除也又吾聞之儒教言至誠不貳則感通天地休徵自臻其餘無論老莊諸子世間所有文字伎藝等誠志不息則有思極至無思而各獲其妙與今所言一心不亂亦頗相類謂心口稱念更無雜想內法如外外法如內心境不二性相一如無思無慮無念而無不念無得而無不得非言所詮修者自知如吾淨宗但能決定願生之心一心不亂稱佛名號即於斯中三心四修一切行願自然圓滿又何有所闕少哉已下重舉本經印决信解請前後諸文心教對照而審思之文云復有不可思議數兜率陀天王皆勤念持一切諸佛所有名號清涼云召體曰名響頒人天為號乃至以諸如來同一法界體德均故爾時大威光童子乃至得念佛三昧名無邊海藏門清涼引智論云菩薩以般若波羅蜜為母般舟三昧為父良以念佛即真涉事與方便同故得稱父又念佛成佛是親種故疏文一言蔽諸者念一佛號亦名一言直取一言只一佛字故又法界品德雲念佛門下云最初善友先明念佛法門者以是眾行之先故乃至依佛方便能成勝行故功高易進以獎物故具載海藏典决如來普放大光明一切十方無不照令隨念佛生功德此發威光解脫門廣大寂靜三摩地不生不滅無來去嚴淨國土示眾生此樹華神之解脫十方所有諸國土悉見如來坐於座朗然開悟大菩提如是喜音之所入一切諸佛一法身真如平等無分別佛以此力常安住普捷現王斯具演如眾生數普現身此一一身充法界悉放淨光雨眾寶如是解脫星幢入如來色形諸相等一切世間莫能測億那由劫共思量色相威德轉無邊如來非以相為體但是無相寂滅法身相威儀悉具足世間隨樂皆得見佛身無生超戲論非是蘊處差別法得自在力决定見所行無畏離言道清涼云决定見者不隨境相名自在力有無不能累其神故無畏也亦非言行處佛以法為身清淨如虗空所現眾色形令入此法中諸佛如虗空究竟常清淨憶念生歡喜彼諸願具足若能除眼瞖捨離於色想不見於諸法則得見如來若有若無有彼想皆除滅如是能見佛安住於實際佛法不可覺了此名覺法諸佛如是修一法不可得以法無性故無有能了知如是解於法究竟無所解又能所分別二俱離雜染清淨無所取若縛若解智悉忘但願普與眾生樂一切世間唯想力以智而入心無畏思惟諸法亦復然三世推求不可得三世所有一切佛悉與等心同智慧一性一相無有殊此無礙種所行道堅固微密一妙身與佛平等無差別隨諸眾生各異見一實身者所行道法界平等無差別具足無量無邊義樂觀一相心不移三世智者所行道一光照觸無涯限十方國土悉充徧普使世間得大明此破闇者所行道佛所莊嚴廣大剎等於一切微塵數清淨佛子悉滿中雨不思議最妙法如於此會見佛坐一切塵中悉如是佛身無去亦無來所有國土皆明現顯示菩薩所修行無量趣地諸方便及說難思真實理令諸佛子入法界能如法供養佛則能念佛心不動若能念佛心不動則常覩見無量佛若常以見無量佛則見如來體常住若見如來體常住則能知法永不滅嚴淨不可思議剎供養一切諸如來放大光明無有邊度脫眾生亦無限智慧自在不思議說法言辭無有礙施戒忍進及禪定智慧方便神通等如是一切皆自在以佛華嚴三昧力寶座高廣最無等徧滿十方無量界種種妙相而莊嚴佛處其上難思議諸佛子眾共圍繞盡於法界悉周徧十方一切無有餘無量無邊法界中無始無終無遐邇示現如來自在力又願以此念佛善根為一眾生於一切世界盡未來劫修菩薩行如為一切眾生為一切眾生亦復如是雖等如來勤供佛雖觀於空集福德知法無二勤作業了剎皆空樂嚴土若有欲得如來智應離一切妄分別有無通達皆平等疾作人天大導師十力大雄最無上譬如虗空無等等境界廣大不可量功德第一超世間十力功德無邊量心意思量所不及人中師子一法門眾生億劫莫能知若有欲知佛境界當淨其意如虗空遠離妄想及諸取令心所向皆無礙清涼云不作意以照境則所照無涯此止體性離而息妄諸取皆寂若斯則不拂不瑩而自淨矣無淨之淨則閭踏佛境矣此為心要請後學思行如來應正等覺金翅鳥王亦復如是住無礙行以淨佛眼觀察法界諸宮殿中一切眾生若曾種善根已成熟者如來奮勇猛十力以止觀兩翅鼓揚生死大愛海水使其兩闢而撮取之置佛法中令斷一切妄想戲論安住如來無分別無礙行善導云若欲學解從凡至聖乃至佛果一切無礙皆得學也若欲學行者必藉有緣之法少用功勞多得益也此文密發千鈞之弩吾曹盲聾不見不聞何則現今無論我人眾生壽者只箇愛憎未能無礙況凡聖乃至佛果法界全體乎然如一心專念彌陀名號直下法界一相三昧故不假作意聲聲念念凡聖佛果無礙圓通淨佛國土成就眾生又導師悲心雖專在於常沒凡夫至其禮讚偈頌諸文十之八九莫不皆有無生無為涅槃法性法界等語此乃所以使後學知佛之大法不離二諦也空祖以爍迦羅眼徹見導師所立專修念佛三昧大明選擇本願一句果號攝盡眾機囊括萬行國師亦顯揚此念佛三昧諸佛體性名體不二自然正智正解相應佛心益發揮正宗提獎末學而唯稱彌陀一行三昧上智下愚一心稱念一道進趣未始有毫髮之異也又應知昔蓮華勝公問空祖大師云於諸法門結緣修習為雜行也否大師曰深信念佛而後結緣眾善是即助業非為雜行也光明既示隨喜他善廻向淨土可不思哉此文載淨宗中古高僧觀徹上人圓戒誘蒙中夫空祖選擇集專雜之廢立頗嚴於善導而其寬容亦及于此焉嗚呼增仰烈祖立宗之悲願恢廓吾輩固我之偏見然則解者結緣于究竟一乘果海法門行者修習於性相一如念佛三昧豈非是隨順佛願相應佛心者耶於是庶幾乎為善導空祖鎮西傳燈之真子矣方今法末之世如斯等大法滿眼映心況復稱名念佛通真涉事普能該攝十方諸佛法報化身圓滿淨佛國土成就眾生障無不滅德無不生吾曹已於念佛三昧得大因緣豈容不進趣哉若夫宿植德本人有時妄想輕安心光發現自然識得十方三世諸佛眾生本來安住金剛道場華藏海會亦即了知八萬四千法門盡是歸入法界一行念佛三昧也縱令此生未獲勝益願以念佛誦經功德諸佛護念天龍加祐身心安穩住勝壽命臨終正念必定得往生安樂剎諸仁者宜當解行雙修護持正宗善巧方便隨機應緣乃宏顯斯不可思議功德摩訶念佛三昧也已古德云要結蓮華會上緣是非人我盡傾捐無時不作難遭想歡喜同登解脫船餘既為先登諸仁者請勉旃更跋拙偈而閣筆曰誰言暮景迫推遷撞著人中大死緣專念彌陀廻避路無邊佛剎影參天弘化二年歲在乙巳十月南勢別山定仙謹撰同安昌實音謹書
